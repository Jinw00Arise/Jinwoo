# golangci-lint configuration for Jinwoo MapleStory Server
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.18"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    # Default linters
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Reports suspicious constructs
    - ineffassign   # Detect ineffective assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused code
    
    # Additional linters
    - bodyclose     # Check HTTP response body is closed
    - durationcheck # Check for two durations multiplied together
    - errname       # Check error naming conventions
    - errorlint     # Find code that will cause problems with error wrapping
    - exhaustive    # Check exhaustiveness of enum switch statements
    - exportloopref # Check for pointers to loop variables
    - gofmt         # Check whether code was gofmt-ed
    - goimports     # Check imports are sorted
    - gosec         # Security checker
    - misspell      # Find commonly misspelled English words
    - nilerr        # Find code that returns nil even if err is not nil
    - noctx         # Find HTTP requests without context
    - prealloc      # Find slice declarations that could be preallocated
    - predeclared   # Find code that shadows predeclared identifiers
    - revive        # Fast, configurable, extensible linter
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Find unused function parameters
    - wastedassign  # Find wasted assignment statements

  disable:
    - gocyclo       # Too strict for game server code
    - funlen        # Handler functions can be long
    - lll           # Line length - not critical
    - wsl           # Whitespace linter - too opinionated

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    check-shadowing: true

  gosec:
    excludes:
      - G104  # Audit errors not checked (handled by errcheck)
      - G304  # Potential file path provided by taint input (WZ file loading is safe)

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
        disabled: true  # Not critical for game server
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: var-declaration
      - name: var-naming

  exhaustive:
    default-signifies-exhaustive: true

  goimports:
    local-prefixes: github.com/Jinw00Arise/Jinwoo

issues:
  exclude-rules:
    # Exclude test files from some checks
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

    # Exclude generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all

    # Allow fmt.Println in main for startup logs
    - path: cmd/
      linters:
        - forbidigo

  max-issues-per-linter: 50
  max-same-issues: 3
  new: false

